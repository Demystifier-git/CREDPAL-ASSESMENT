name: Node.js Docker CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: credpal-assignment-app

    steps:
      #  Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      #  Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      #  Install dependencies
      - name: Install dependencies
        working-directory: ./src
        run: npm install

      #  Run tests 
      - name: Run tests
        run: |
          echo "Running a simple test..."
          node -e "console.log('Test passed')"

      #  Set up Docker login
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      #  Build Docker image
      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:latest ./src

      #  Tag and push Docker image
      - name: Push Docker image
        run: |
          docker tag ${{ env.IMAGE_NAME }}:latest ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v1
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v1