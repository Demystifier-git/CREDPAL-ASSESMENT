name: test-build-pushImage to DockerHub

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: credpal-assignment-app

    steps:
      #  Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      #  Set up Node.js (optional if tests run inside Docker)
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      

      #  Run a simple test
      - name: Run tests inside Docker
        run: |
          docker build -t ${{ env.IMAGE_NAME }} ./src
          docker run --rm ${{ env.IMAGE_NAME }} node -e "console.log('Test passed')"

      #  Docker login
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      #  Tag the image as v1
      - name: Tag image as v1
        run: docker tag ${{ env.IMAGE_NAME }}:latest ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v1

      #  Push Docker image
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v1