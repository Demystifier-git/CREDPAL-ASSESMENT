name: test-build-push to dockerhub

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: credpal-assignment-app

    steps:
      #  Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      #  Log in to DockerHub
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      #  Build, test, tag & push to dockerhub
      - name: Build, test, tag & push Docker image
        run: |
          # Build image
          docker build -t ${{ env.IMAGE_NAME }} ./src

          # Run a quick test
          docker run --rm ${{ env.IMAGE_NAME }} node -e "console.log('Test passed')"

          # Tag for DockerHub
          docker tag ${{ env.IMAGE_NAME }} ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          docker tag ${{ env.IMAGE_NAME }} ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v1

          # Push images
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v1