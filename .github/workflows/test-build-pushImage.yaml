name: test-build-pushImage to DockerHub

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: credpal-assignment-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Run tests inside Docker
        run: |
          docker build -t ${{ env.IMAGE_NAME }} ./src
          docker run --rm ${{ env.IMAGE_NAME }} node -e "console.log('Test passed')"

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & tag for Docker Hub directly
      - name: Build & tag Docker image as v1
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/credpal-assignment-app:v1 ./src

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/credpal-assignment-app:v1