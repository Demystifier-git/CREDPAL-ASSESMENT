name: Node.js Docker CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: credpal-assignment-app

    steps:
      #  Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      #  Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      #  Install dependencies
      - name: Install dependencies
        working-directory: ./src
        run: npm install

      #  Run tests 
      - name: Run tests
        run: |
          echo "Running a simple test..."
          node -e "console.log('Test passed')"

      #  Set up Docker login
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      #  
      - name: Build Docker image
        run: docker build -t credpal-assignment-app:latest ./src

      - name: Tag image as v1
        run: docker tag credpal-assignment-app:latest ${{ secrets.DOCKER_USERNAME }}/credpal-assignment-app:v1

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/credpal-assignment-app:v1