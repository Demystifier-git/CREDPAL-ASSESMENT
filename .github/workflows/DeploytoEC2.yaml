name: Deploy app to Private EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
      APP_DIR: ${{ secrets.APP_DIR }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: ${{ secrets.DEPLOY_S3_BUCKET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 1️⃣ Upload code to S3 as a tarball
      - name: Upload code to S3
        run: |
          tar -czf app.tar.gz .
          aws s3 cp app.tar.gz s3://$S3_BUCKET/app.tar.gz

      # 2️⃣ Deploy code to EC2 via SSM
      - name: Deploy code via SSM
        run: |
          aws ssm send-command \
            --targets "Key=instanceIds,Values=$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy app code" \
            --parameters 'commands=[
              "sudo mkdir -p '"$APP_DIR"'",
              "sudo chown -R ubuntu:ubuntu '"$APP_DIR"'",
              "aws s3 cp s3://'"$S3_BUCKET"'/app.tar.gz /tmp/app.tar.gz",
              "sudo tar -xzf /tmp/app.tar.gz -C '"$APP_DIR"'"
            ]' \
            --region $AWS_REGION \
            --output json