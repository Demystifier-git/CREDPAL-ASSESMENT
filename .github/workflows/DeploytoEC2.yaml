name: Deploy app to Private EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
      APP_DIR: ${{ secrets.APP_DIR }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      #  Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v3

      #  Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      #  Deploy application code via SSM as root
      - name: Deploy application code as root
        run: |
          echo "Deploying code to EC2 $EC2_INSTANCE_ID in $APP_DIR as root"
          aws ssm send-command \
            --targets "Key=instanceIds,Values=$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy app code as root" \
            --parameters 'commands=["sudo -i bash -c '\''mkdir -p '"$APP_DIR"' && rsync -av /github/workspace/ '"$APP_DIR"'\''"]' \
            --region $AWS_REGION \
            --output json