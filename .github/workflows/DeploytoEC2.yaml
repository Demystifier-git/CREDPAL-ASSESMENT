name: Deploy app to Private EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
      APP_DIR: ${{ secrets.APP_DIR }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3. Package the application safely
      - name: Package app
        run: |
          echo "Listing current directory..."
          ls -la
          
          echo "Setting permissions..."
          chmod -R u+rwX .
          
          echo "Creating tarball..."
          tar --exclude=app.tar.gz --exclude=.git -czf app.tar.gz *
          
          echo "Uploading tarball to S3..."
          if aws s3 cp app.tar.gz s3://$S3_BUCKET/app.tar.gz; then
            echo "Upload succeeded"
          else
            echo "Upload failed" && exit 1
          fi

      # 4. Deploy app to EC2 via SSM
      - name: Deploy app to EC2
        run: |
          echo "Sending deployment command via SSM..."
          aws ssm send-command \
            --targets "Key=instanceIds,Values=$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy app code" \
            --parameters 'commands=[
              "sudo mkdir -p '"$APP_DIR"'",
              "sudo aws s3 cp s3://'"$S3_BUCKET"'/app.tar.gz /tmp/app.tar.gz",
              "sudo tar -xzf /tmp/app.tar.gz -C '"$APP_DIR"'",
              "sudo chown -R ubuntu:ubuntu '"$APP_DIR"'",
              "echo Deployment complete. Listing deployed files:",
              "ls -la '"$APP_DIR"'"
            ]' \
            --region $AWS_REGION \
            --output json