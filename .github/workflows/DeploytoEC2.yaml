name: Deploy app to Private EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
      APP_DIR: ${{ secrets.APP_DIR }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3️⃣ Deploy code via SSM streaming tar
      - name: Deploy application code via SSM
        run: |
          echo "Deploying code to EC2 $EC2_INSTANCE_ID in $APP_DIR"

          # Create remote directory as root
          aws ssm send-command \
            --targets "Key=instanceIds,Values=$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Create app directory" \
            --parameters 'commands=["sudo mkdir -p '"$APP_DIR"'", "sudo chown -R ubuntu:ubuntu '"$APP_DIR"'"]' \
            --region $AWS_REGION \
            --output json

          # Stream code via tar to EC2
          tar -cf - . | aws ssm send-command \
            --targets "Key=instanceIds,Values=$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy app code" \
            --parameters 'commands=["sudo tar -xf - -C '"$APP_DIR"'"]' \
            --region $AWS_REGION \
            --output json